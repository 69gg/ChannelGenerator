name: Discover Free LLM Channels

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: discover-free-llm-channels
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Validate required secrets
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          if [ -z "$LLM_API_KEY" ]; then
            echo "LLM_API_KEY secret is required. Configure it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Run discovery pipeline
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_SUMMARY_MODEL: ${{ vars.LLM_SUMMARY_MODEL }}
          LLM_THINKING_ENABLED: ${{ vars.LLM_THINKING_ENABLED }}
          LLM_REASONING_EFFORT: ${{ vars.LLM_REASONING_EFFORT }}
          LLM_SUMMARY_THINKING_ENABLED: ${{ vars.LLM_SUMMARY_THINKING_ENABLED }}
          LLM_SUMMARY_REASONING_EFFORT: ${{ vars.LLM_SUMMARY_REASONING_EFFORT }}
          KEYWORD_COUNT: ${{ vars.KEYWORD_COUNT }}
          KEYWORD_AGENTS: ${{ vars.KEYWORD_AGENTS }}
          URLS_PER_SEARCH_PAGE: ${{ vars.URLS_PER_SEARCH_PAGE }}
          RECURSION_DEPTH: ${{ vars.RECURSION_DEPTH }}
          URLS_PER_RECURSION: ${{ vars.URLS_PER_RECURSION }}
          MAX_SEARCH_PER_QUERY: ${{ vars.MAX_SEARCH_PER_QUERY }}
          MAX_RESULTS: ${{ vars.MAX_RESULTS }}
        run: |
          args=(
            --llm-api-key "$LLM_API_KEY"
            --output report.md
            --state-file state.json
          )

          add_arg() {
            if [ -n "$2" ]; then
              args+=("$1" "$2")
            fi
          }

          add_bool_flag() {
            case "${3,,}" in
              true|1|yes|on)
                args+=("$1")
                ;;
              false|0|no|off)
                args+=("$2")
                ;;
              "")
                ;;
              *)
                echo "$3 is not a valid boolean for $1/$2"
                exit 1
                ;;
            esac
          }

          add_arg --llm-base-url "$LLM_BASE_URL"
          add_arg --llm-model "$LLM_MODEL"
          add_arg --llm-summary-model "$LLM_SUMMARY_MODEL"
          add_bool_flag --llm-thinking --no-llm-thinking "$LLM_THINKING_ENABLED"
          add_arg --llm-reasoning-effort "$LLM_REASONING_EFFORT"
          add_bool_flag \
            --llm-summary-thinking \
            --no-llm-summary-thinking \
            "$LLM_SUMMARY_THINKING_ENABLED"
          add_arg --llm-summary-reasoning-effort "$LLM_SUMMARY_REASONING_EFFORT"
          add_arg --keyword-count "$KEYWORD_COUNT"
          add_arg --keyword-agents "$KEYWORD_AGENTS"
          add_arg --urls-per-search-page "$URLS_PER_SEARCH_PAGE"
          add_arg --recursion-depth "$RECURSION_DEPTH"
          add_arg --urls-per-recursion "$URLS_PER_RECURSION"
          add_arg --max-search-per-query "$MAX_SEARCH_PER_QUERY"
          add_arg --max-results "$MAX_RESULTS"

          uv run channel-generator run "${args[@]}"

      - name: Compute release tag and title
        id: release_meta
        run: |
          tag_timestamp=$(date -u +"%Y%m%d-%H%M%S")
          title_timestamp=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          echo "tag=report-${tag_timestamp}" >> "$GITHUB_OUTPUT"
          echo "title=Channel Report ${title_timestamp}" >> "$GITHUB_OUTPUT"

      - name: Upload run artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_meta.outputs.tag }}
          path: |
            report.md
            state.json
          if-no-files-found: error

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release_meta.outputs.tag }}
          RELEASE_TITLE: ${{ steps.release_meta.outputs.title }}
        run: |
          gh release create "$TAG_NAME" \
            report.md \
            state.json \
            --title "$RELEASE_TITLE" \
            --notes-file report.md \
            --target "$GITHUB_SHA"
